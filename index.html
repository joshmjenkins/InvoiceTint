  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

02Fdiv>\n      <input value=\"{{ vin }}\" onchange=\"{{ onVin }}\" placeholder=\"—\" style=\"width:100%;box-sizing:border-box;background:transparent;border:none;border-bottom:1px solid rgba(33,31,28,.25);font-family:'Hanken Grotesk',sans-serif;font-size:13px;color:#211f1c;padding:6px 0;margin-top:4px\" style-focus=\"border-bottom:1px solid #A67F45\">\n    <\u002Fdiv>\n    <div style=\"flex:1\">\n      <div style=\"font-size:9.5px;letter-spacing:.24em;color:#8a8478\">RO / PO #<\u002Fdiv>\n      <input value=\"{{ po }}\" onchange=\"{{ onPo }}\" placeholder=\"—\" style=\"width:100%;box-sizing:border-box;background:transparent;border:none;border-bottom:1px solid rgba(33,31,28,.25);font-family:'Hanken Grotesk',sans-serif;font-size:13px;color:#211f1c;padding:6px 0;margin-top:4px\" style-focus=\"border-bottom:1px solid #A67F45\">\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"padding:30px 44px 0\">\n    <div style=\"display:grid;grid-template-columns:1fr 260px 110px;gap:16px;border-bottom:1.5px solid #211f1c;padding-bottom:8px\">\n      <div style=\"font-size:9.5px;letter-spacing:.26em;color:#211f1c\">SERVICE PERFORMED<\u002Fdiv>\n      <div style=\"font-size:9.5px;letter-spacing:.26em;color:#211f1c\">DETAILS / COVERAGE<\u002Fdiv>\n      <div style=\"font-size:9.5px;letter-spacing:.26em;color:#211f1c;text-align:right\">AMOUNT<\u002Fdiv>\n    <\u002Fdiv>\n    <sc-for list=\"{{ rows }}\" as=\"r\" hint-placeholder-count=\"6\">\n      <div style=\"display:grid;grid-template-columns:1fr 260px 110px;gap:16px;align-items:center;border-bottom:1px solid rgba(33,31,28,.12)\">\n        <input value=\"{{ r.svc }}\" onchange=\"{{ r.onSvc }}\" placeholder=\"{{ r.svcPh }}\" style=\"background:transparent;border:none;font-family:'Hanken Grotesk',sans-serif;font-size:13.5px;font-weight:500;color:#211f1c;padding:12px 0\" style-focus=\"background:rgba(166,127,69,.06)\">\n        <input value=\"{{ r.det }}\" onchange=\"{{ r.onDet }}\" placeholder=\"{{ r.detPh }}\" style=\"background:transparent;border:none;font-family:'Hanken Grotesk',sans-serif;font-size:12.5px;color:#4a463f;padding:12px 0\" style-focus=\"background:rgba(166,127,69,.06)\">\n        <div style=\"display:flex;align-items:baseline;justify-content:flex-end;gap:2px\">\n          <div style=\"font-size:12px;color:#A67F45\">$<\u002Fdiv>\n          <input value=\"{{ r.amt }}\" onchange=\"{{ r.onAmt }}\" placeholder=\"0.00\" inputmode=\"decimal\" style=\"width:80px;background:transparent;border:none;font-family:'Hanken Grotesk',sans-serif;font-size:13.5px;color:#211f1c;padding:12px 0;text-align:right;font-variant-numeric:tabular-nums\" style-focus=\"background:rgba(166,127,69,.06)\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <div style=\"display:flex;justify-content:space-between;gap:40px;padding:26px 44px 0\">\n    <div style=\"flex:1\">\n      <div style=\"font-size:9.5px;letter-spacing:.24em;color:#8a8478\">NOTES<\u002Fdiv>\n      <textarea value=\"{{ notes }}\" onchange=\"{{ onNotes }}\" placeholder=\"Film brands &amp; lot numbers, warranty registration, special instructions…\" rows=\"{{ notesRows }}\" style=\"width:100%;box-sizing:border-box;background:transparent;border:none;border-bottom:1px solid rgba(33,31,28,.2);font-family:'Hanken Grotesk',sans-serif;font-size:12.5px;line-height:1.6;color:#4a463f;padding:8px 0;margin-top:6px;resize:none\" style-focus=\"border-bottom:1px solid #A67F45\"><\u002Ftextarea>\n    <\u002Fdiv>\n    <div style=\"width:280px\">\n      <div style=\"display:flex;justify-content:space-between;font-size:13px;color:#4a463f;padding:5px 0\">\n        <div>Subtotal<\u002Fdiv><div style=\"font-variant-numeric:tabular-nums\">{{ subFmt }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;align-items:center;font-size:13px;color:#4a463f;padding:5px 0\">\n        <div style=\"display:flex;align-items:baseline;gap:4px\">Tax <input value=\"{{ taxStr }}\" onchange=\"{{ onTax }}\" inputmode=\"decimal\" style=\"width:38px;background:transparent;border:none;border-bottom:1px solid rgba(33,31,28,.25);font-family:'Hanken Grotesk',sans-serif;font-size:12px;color:#4a463f;text-align:center;padding:2px 0\" style-focus=\"border-bottom:1px solid #A67F45\">%<\u002Fdiv>\n        <div style=\"font-variant-numeric:tabular-nums\">{{ taxFmt }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;align-items:baseline;border-top:1.5px solid #211f1c;margin-top:10px;padding-top:12px\">\n        <div style=\"font-size:10px;letter-spacing:.26em\">TOTAL DUE<\u002Fdiv>\n        <div style=\"font-family:'Cormorant Garamond',serif;font-size:30px;font-variant-numeric:tabular-nums\">{{ totFmt }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"padding:34px 44px 40px\">\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:56px;margin-top:14px\">\n      <div>\n        <div style=\"border-bottom:1px solid #211f1c;height:32px\"><\u002Fdiv>\n        <div style=\"font-size:9px;letter-spacing:.22em;color:#79736a;margin-top:7px\">INSTALLER SIGNATURE &nbsp;·&nbsp; DATE<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"border-bottom:1px solid #211f1c;height:32px\"><\u002Fdiv>\n        <div style=\"font-size:9px;letter-spacing:.22em;color:#79736a;margin-top:7px\">JENKINS GENESIS OF OCALA · AUTHORIZED &nbsp;·&nbsp; DATE<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-size:9px;line-height:1.7;color:#8a8478;margin-top:28px;letter-spacing:.02em\">Work performed at the request of Jenkins Genesis of Ocala. Payment terms net 30 unless otherwise agreed. All film installations carry the applicable manufacturer warranty; installer certifies materials and workmanship meet manufacturer specifications.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    let saved = null;\n    try { saved = JSON.parse(localStorage.getItem('jgo-invoice-v1') || 'null'); } catch (e) {}\n    this.state = Object.assign(this.blank(), saved || {});\n  }\n  blank() {\n    const today = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });\n    return {\n      vName: '', vContact: '', invNo: '', invDate: today,\n      vehicle: '', stock: '', vin: '', po: '', addr: '',\n      items: [{}, {}, {}, {}, {}, {}].map(() => ({ svc: '', det: '', amt: '' })),\n      notes: '', taxStr: '0'\n    };\n  }\n  save() {\n    try { localStorage.setItem('jgo-invoice-v1', JSON.stringify(this.state)); } catch (e) {}\n  }\n  componentDidUpdate() { this.save(); }\n  fmt2(n) { return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }\n\n  renderVals() {\n    const st = this.state;\n    const items = st.items || [];\n    const rows = items.map((it, i) => ({\n      svc: it.svc, det: it.det, amt: it.amt,\n      svcPh: '', detPh: '',\n      onSvc: (e) => this.patchItem(i, { svc: e.target.value }),\n      onDet: (e) => this.patchItem(i, { det: e.target.value }),\n      onAmt: (e) => this.patchItem(i, { amt: e.target.value.replace(/[^0-9.]/g, '') })\n    }));\n    const sub = items.reduce((a, it) => a + (parseFloat(it.amt) || 0), 0);\n    const taxRate = parseFloat(st.taxStr) || 0;\n    const tax = sub * taxRate / 100;\n    const onField = (key) => (e) => this.setState({ [key]: e.target.value });\n    return {\n      rows,\n      subFmt: this.fmt2(sub), taxFmt: this.fmt2(tax), totFmt: this.fmt2(sub + tax),\n      taxStr: st.taxStr, onTax: (e) => this.setState({ taxStr: e.target.value.replace(/[^0-9.]/g, '') }),\n      vName: st.vName, onVName: onField('vName'),\n      vContact: st.vContact, onVContact: onField('vContact'),\n      invNo: st.invNo, onInvNo: onField('invNo'),\n      invDate: st.invDate, onInvDate: onField('invDate'),\n      vehicle: st.vehicle, onVehicle: onField('vehicle'),\n      stock: st.stock, onStock: onField('stock'),\n      vin: st.vin, onVin: onField('vin'),\n      po: st.po, onPo: onField('po'),\n      addr: st.addr, onAddr: onField('addr'),\n      notes: st.notes, onNotes: onField('notes'), notesRows: 3,\n      doPrint: () => window.print(),\n      doClear: () => this.setState(this.blank())\n    };\n  }\n  patchItem(i, patch) {\n    const items = this.state.items.map((it, j) => j === i ? { ...it, ...patch } : it);\n    this.setState({ items });\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
